name: Bitfinex Lending Bot

on:
  schedule:
    # 每 30 分鐘跑一次(UTC)。公開 repo 分鐘數無上限,可改成 "*/10 * * * *"。
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN(只顯示動作、不真的下單)"
        type: boolean
        default: false

permissions:
  contents: write # 發佈儀表板資料與 keep-alive commit 需要

concurrency:
  group: lending-bot
  cancel-in-progress: false

jobs:
  lend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run lending bot
        id: bot
        shell: bash
        env:
          BFX_API_KEY: ${{ secrets.BFX_API_KEY }}
          BFX_API_SECRET: ${{ secrets.BFX_API_SECRET }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        # 輸出留一份到 bot_run.log 給儀表板顯示,並保留原始退出碼
        run: |
          set +e
          python bot.py 2>&1 | tee bot_run.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      # 就算機器人失敗也發佈,讓儀表板看得到錯誤 log
      - name: Build encrypted dashboard data
        if: always()
        env:
          BFX_API_KEY: ${{ secrets.BFX_API_KEY }}
          BFX_API_SECRET: ${{ secrets.BFX_API_SECRET }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          BOT_EXIT: ${{ steps.bot.outputs.exit_code || '1' }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: python publish.py

      - name: Commit dashboard data
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.enc
          if git diff --cached --quiet; then
            echo "儀表板資料無變化,不需 commit"
            exit 0
          fi
          git commit -m "chore: update dashboard data"
          git push || { git pull --rebase origin master && git push; }
